<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lodestar CAIO — Practice Operating System</title>
<style>
  :root{
    --navy:#16223a; --navy2:#1f2f4d; --slate:#33425b; --ink:#1a2233;
    --line:#dfe4ec; --bg:#f4f6fa; --card:#ffffff; --muted:#637089;
    --accent:#c8a24a; --accent2:#a8842f;
    --green:#1f8a4c; --greenbg:#e7f5ec; --yellow:#b07c12; --yellowbg:#fbf2dc; --red:#b3261e; --redbg:#fbe7e6;
    --blue:#2563a8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.5}
  a{color:var(--blue);text-decoration:none}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .side{width:240px;background:var(--navy);color:#dde4f0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .logo{font-weight:800;font-size:19px;letter-spacing:.3px;color:#fff}
  .brand .logo span{color:var(--accent)}
  .brand .tag{font-size:11px;color:#93a1bd;margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
  nav{padding:10px 8px;flex:1;overflow:auto}
  nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;color:#c2cce0;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;text-align:left;margin-bottom:2px}
  nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  nav button.active{background:var(--accent);color:#1a2233;font-weight:600}
  nav .ico{width:18px;text-align:center;font-size:15px}
  .side .foot{padding:12px 16px;font-size:11px;color:#7f8db0;border-top:1px solid rgba(255,255,255,.08)}
  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
  .top h1{font-size:18px;margin:0;font-weight:700}
  .top .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .content{padding:24px 26px;max-width:1100px}
  /* Components */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card h3{margin:18px 0 8px;font-size:14px;color:var(--slate)}
  .card .desc{color:var(--muted);font-size:13px;margin-bottom:14px}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:880px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .n{font-size:30px;font-weight:800;color:var(--navy)}
  .kpi .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin:10px 0 4px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
  textarea{min-height:80px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--navy2)}
  .btn.gold{background:var(--accent);color:#1a2233}
  .btn.gold:hover{background:var(--accent2)}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{background:#f0f3f8}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.danger{background:#fff;color:var(--red);border:1px solid #e7c6c4}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .row>div{flex:1;min-width:140px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  tr:hover td{background:#fafbfd}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.green{background:var(--greenbg);color:var(--green)} .pill.yellow{background:var(--yellowbg);color:var(--yellow)} .pill.red{background:var(--redbg);color:var(--red)} .pill.gray{background:#eef1f6;color:var(--muted)} .pill.blue{background:#e7f0fa;color:var(--blue)}
  .seg-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .seg-tabs button{padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--slate)}
  .seg-tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .q{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .q .qt{font-weight:600;font-size:14px;margin-bottom:8px}
  .q .opts{display:flex;gap:6px;flex-wrap:wrap}
  .q .opts button{border:1px solid var(--line);background:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted)}
  .q .opts button.on.green{background:var(--green);color:#fff;border-color:var(--green)}
  .q .opts button.on.yellow{background:var(--yellow);color:#fff;border-color:var(--yellow)}
  .q .opts button.on.red{background:var(--red);color:#fff;border-color:var(--red)}
  .q .opts button.on.na{background:var(--slate);color:#fff;border-color:var(--slate)}
  .readout{border:1px solid var(--line);border-radius:10px;padding:18px;background:#fff;margin-top:16px}
  .ex{border-left:4px solid var(--line);padding:8px 12px;margin:8px 0;background:#fafbfd;border-radius:0 8px 8px 0}
  .ex.red{border-color:var(--red)} .ex.yellow{border-color:var(--yellow)} .ex.green{border-color:var(--green)}
  .ex .move{font-size:12px;color:var(--slate);margin-top:3px}
  .out{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;background:#fbfcfe;border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:10px;line-height:1.55}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 0}
  .empty{color:var(--muted);font-size:13px;padding:14px;text-align:center}
  .note{font-size:12px;color:var(--muted);background:#f6f8fb;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:10px}
  .scorebar{height:10px;border-radius:6px;background:#eef1f6;overflow:hidden;display:flex;margin:6px 0}
  .scorebar i{display:block;height:100%}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  .inline{display:flex;gap:8px;align-items:center}
  .hidden{display:none!important}
  @media print{
    .side,.top,.toolbar,.noprint{display:none!important}
    .content{padding:0;max-width:none}
    .card{border:none;padding:0}
    body{background:#fff}
  }
</style>

function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function today(){return new Date().toISOString().slice(0,10);}

/* ============================== SNAPSHOT CONTENT ============================== */
/* Each question: status set by user (green/yellow/red/na). exposure + move used in readout. */
const SNAP={

/* ============================== POLICY TEMPLATES ============================== */
function policyBrokerage(d){return `AI USE POLICY — ${d.firm||"[Firm Name]"}
Real Estate Brokerage (brokers & salespersons)

Effective date: ${d.date||today()}   Responsible broker: ${d.broker||"[name, DRE #]"}   Questions to: ${d.contact||d.email||"[contact]"}

WHY THIS POLICY EXISTS
AI tools are useful and already in use at this firm. This policy says which tools are approved, what client information must never go into them, and the one review step every piece of AI-assisted marketing must pass before it publishes. The responsible broker is accountable for what agents publish under the firm's name; this is how we meet that responsibility.

THE THREE RULES THAT MATTER MOST
1. People decide and sign. AI drafts; a licensed person reviews, verifies, and owns every output that leaves the firm.
2. No client data in unapproved tools. Never paste client/buyer financials, IDs, pre-approvals, or contracts into a consumer AI tool. Approved tools only.
3. Fair-housing review before publish. Every AI-assisted listing, ad, caption, email, or image passes the fair-housing check below before it goes out.

FAIR-HOUSING REVIEW (mandatory, before publish)
- Describe the property, not the people. No reference to or preference for any protected class — directly or by code word.
- No "code words" (e.g., "great for families", "safe/exclusive neighborhood", "walk to [house of worship]").
- No steering: don't characterize neighborhoods by who lives there.
- Facts verified: sqft, beds/baths, permits, schools, HOA, price — AI invents these.
- AI-altered images disclosed; never misrepresent condition.

CLIENT OUTREACH (texts/calls/email)
AI-drafted or AI-placed texts/calls follow TCPA: prior consent, DNC compliance, working opt-out. A licensed person reviews AI-drafted client messages before sending.

RECORDING & CONSENT
No AI note-taker records a client call/meeting without all-party consent (California).

VALUATION GUARDRAIL
Do not present AI "valuations" as appraisals or supported value. Keep CMAs/BPOs in scope with disclaimers.

CONFIDENTIALITY & DATA
Treat client information as confidential. Approved tools must not train on our data.

IF SOMETHING GOES WRONG
Tell the responsible broker immediately if an AI-assisted fair-housing problem went out, client data went into an unapproved tool, or a wrong AI output reached a client.

ACKNOWLEDGEMENT
Name: __________________  DRE #: __________  Signature: __________________  Date: ________

Maintained with ${d.practice||"Lodestar CAIO"}. Review at least annually and when tools or rules change. Not legal advice.`;}

function policyEscrowTitle(d){return `AI USE POLICY — ${d.firm||"[Company Name]"}
Escrow & Title (AI addendum to your Information Security Program)

Effective date: ${d.date||today()}   Qualified individual / ISP owner: ${d.broker||"[name]"}   Questions to: ${d.contact||d.email||"[contact]"}

WHY THIS POLICY EXISTS
This company is a financial institution under Gramm-Leach-Bliley and holds the most sensitive data and the money in the transaction. This policy governs AI so it doesn't create a breach, a Safeguards violation, or a fraud loss. It sits alongside your WISP and (title) ALTA Best Practices program.

THE THREE RULES THAT MATTER MOST
1. NPI never goes into an unapproved AI tool. No customer financials, SSNs, account numbers, IDs, or closing figures into a consumer/free AI tool. Approved, WISP-covered, no-training tools only.
2. AI never verifies a wire or payoff. Funds and payoff instructions are verified out-of-band by a person using independently obtained numbers — assuming any inbound email or voice may be AI-generated/deepfaked.
3. A qualified person owns every determination. AI may assist with summaries and document handling; a licensed/qualified human owns every title determination and disbursement decision.

APPROVED TOOLS & VENDOR AI
Use only tools on the approved-tool list; NPI-capable tools must be inside the WISP, access-controlled, encrypted, and contractually prohibited from training on our data. Vendor AI features are reviewed before use (where does data go, is NPI exposed, training disabled, breach terms). For title, this is ALTA Pillar 3 third-party oversight.

WIRE FRAUD & DEEPFAKES (AI-aware verification)
Verify all wire/payoff instructions by independent callback to a number you obtained yourself — never one from the inbound email/call. Treat unexpected changes as fraud until verified. A convincing voice or perfect email is not verification.

NPI HANDLING (Safeguards / ALTA Pillar 3)
Outputs that summarize NPI are themselves NPI. Customer-facing AI must not collect NPI in the clear. Limit access to staff who need it.

DOCUMENT & DETERMINATION HANDLING
AI may assist; the responsible person verifies every material item (exceptions, liens, vesting, legal description, figures) before relying on it.

INCIDENTS (THE 30-DAY CLOCK)
Report immediately if NPI may have been exposed to an AI tool, or any suspected AI-driven fraud. A security event involving the unencrypted NPI of 500+ consumers must be reported to the FTC as soon as possible and within 30 days of discovery.

ACKNOWLEDGEMENT
Name: __________________  Role: __________  Signature: __________________  Date: ________

Maintained with ${d.practice||"Lodestar CAIO"}. Integrate with your WISP and (title) ALTA program. Review at least annually. Not legal advice.`;}

/* ---------- SNAPSHOT ---------- */
let snapSeg="escrow";let snapAns={};let snapFirm="";
VIEWS.snapshot=function(){
  return `
  <div class="card noprint">
    <h2>1 · Select segment & firm</h2>
    <div class="seg-tabs" id="snapTabs">${SEGLIST.map(s=>`<button data-s="${s}" class="${s===snapSeg?'active':''}">${SEG[s].name}</button>`).join("")}</div>
    <div class="row">
      <div><label>Firm / contact</label><input id="snapFirm" placeholder="e.g., Wilshire Escrow — Eric Shewfelt" value="${esc(snapFirm)}"></div>
      <div style="flex:0"><label>&nbsp;</label><button class="btn ghost" onclick="resetSnap()">Clear answers</button></div>
    </div>
  </div>
  <div class="card noprint">
    <h2>2 · Score the tripwires</h2>
    <div class="desc">Mark each: <span class="pill green">Green</span> fine · <span class="pill yellow">Yellow</span> in use, ungoverned · <span class="pill red">Red</span> active exposure · <span class="pill gray">N/A</span></div>
    <div id="snapQs"></div>
  </div>
  <div id="snapOut"></div>`;
};
function initSnapshot(){
  document.querySelectorAll("#snapTabs button").forEach(b=>b.onclick=()=>{snapSeg=b.dataset.s;snapAns={};render();});
  const fi=document.getElementById("snapFirm");if(fi)fi.oninput=e=>snapFirm=e.target.value;
  renderSnapQs();
}
function renderSnapQs(){
  const qs=SNAP[snapSeg];
  document.getElementById("snapQs").innerHTML=qs.map((o,i)=>{
    const v=snapAns[i]||"";
    const b=(val,lbl,cls)=>`<button class="${v===val?'on '+cls:''}" onclick="setAns(${i},'${val}')">${lbl}</button>`;
    return `<div class="q"><div class="qt">${i+1}. ${esc(o.q)}</div><div class="opts">
      ${b('green','Green','green')}${b('yellow','Yellow','yellow')}${b('red','Red','red')}${b('na','N/A','na')}</div></div>`;
  }).join("");
  renderReadout();
}
function setAns(i,v){snapAns[i]=v;renderSnapQs();}
function resetSnap(){snapAns={};renderSnapQs();}
function renderReadout(){
  const qs=SNAP[snapSeg];
  const answered=Object.keys(snapAns).length;
  const reds=[],yellows=[],greens=[];
  qs.forEach((o,i)=>{const v=snapAns[i];if(v==='red')reds.push(o);else if(v==='yellow')yellows.push(o);else if(v==='green')greens.push(o);});
  const scored=reds.length+yellows.length+greens.length;
  const risk=scored?Math.round(((reds.length*2+yellows.length)/(scored*2))*100):0;
  const level=risk>=50?'red':risk>=20?'yellow':'green';
  const levelTxt=level==='red'?'HIGH exposure':level==='yellow'?'MODERATE exposure':'LOW exposure';
  const exHtml=(arr,cls)=>arr.map(o=>`<div class="ex ${cls}"><b>${esc(o.exp)}</b><div class="move">First move: ${esc(o.move)}</div></div>`).join("");
  const el=document.getElementById("snapOut");if(!el)return;
  el.innerHTML=`<div class="card">
    <div class="toolbar noprint" style="justify-content:flex-end">
      <button class="btn ghost sm" onclick="window.print()">⎙ Print readout</button>
      <button class="btn ghost sm" onclick="copyReadout()">⧉ Copy text</button>
      <button class="btn sm" onclick="saveSnapshotAndPropose()">§ Save &amp; propose</button>
      <button class="btn gold sm" onclick="saveSnapshot()">✓ Save to record</button>
    </div>
    <h2>AI Governance Snapshot — Readout</h2>
    <div class="desc">${esc(snapFirm||'[Firm]')} · Segment: ${SEG[snapSeg].name} · ${today()}</div>
    <div class="inline"><span class="badge" style="background:var(--${level}bg);color:var(--${level})">${levelTxt}</span>
      <span class="legend">${reds.length} red · ${yellows.length} yellow · ${greens.length} green · ${answered}/${qs.length} scored</span></div>
    <div class="scorebar"><i style="width:${risk}%;background:var(--${level})"></i></div>
    ${reds.length?`<h3>Top exposures — address first</h3>${exHtml(reds,'red')}`:''}
    ${yellows.length?`<h3>In use, needs governance</h3>${exHtml(yellows,'yellow')}`:''}
    ${greens.length?`<h3>Fine as run</h3>${exHtml(greens,'green')}`:''}
    ${!scored?`<div class="empty">Score the tripwires above to generate the readout.</div>`:''}
    <div class="note">Recommended next step: a written AI-use policy and the review steps that close the reds, then ongoing oversight scaled to the firm. The Snapshot proves the gap; the engagement closes it. Not legal advice.</div>
  </div>`;
}
function readoutText(){
  const qs=SNAP[snapSeg];const reds=[],yellows=[];
  qs.forEach((o,i)=>{const v=snapAns[i];if(v==='red')reds.push(o);else if(v==='yellow')yellows.push(o);});
  let t=`AI GOVERNANCE SNAPSHOT — READOUT\n${snapFirm||'[Firm]'} · ${SEG[snapSeg].name} · ${today()}\n\n`;
  if(reds.length){t+="TOP EXPOSURES — ADDRESS FIRST\n";reds.forEach(o=>t+=`• ${o.exp}\n   First move: ${o.move}\n`);t+="\n";}
  if(yellows.length){t+="IN USE, NEEDS GOVERNANCE\n";yellows.forEach(o=>t+=`• ${o.exp}\n   First move: ${o.move}\n`);t+="\n";}
  t+="NEXT STEP: a written AI-use policy and review steps that close the reds, then ongoing oversight. Not legal advice.\n\n"+sig();
  return t;
}
function copyReadout(){copyText(readoutText());}
function saveSnapshot(){
  state.snapshots.push({id:uid(),firm:snapFirm,segment:snapSeg,date:today(),answers:{...snapAns}});
  save();toast("Snapshot saved to record.");
}
function saveSnapshotAndPropose(){
  const id=uid();
  state.snapshots.push({id,firm:snapFirm,segment:snapSeg,date:today(),answers:{...snapAns}});
  save();proSel=id;go('proposals');
}

let vet={};
VIEWS.vetting=function(){
  const v=vet;
  const f=(k,lbl,opts)=>`<div><label>${lbl}</label><select onchange="vet.${k}=this.value;buildVet()">${['',...opts].map(o=>`<option ${v[k]===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  return `
  <div class="card noprint">
    <h2>AI tool / vendor assessment</h2>
    <div class="desc">Score a tool before it's approved. Any single red gate blocks approval until resolved.</div>
    <div class="row"><div><label>Vendor / product</label><input oninput="vet.name=this.value" value="${esc(v.name||'')}"></div>
    <div><label>Intended use / segment</label><input oninput="vet.use=this.value" value="${esc(v.use||'')}"></div></div>
    <div class="row">
      ${f('train','Trains on our data?',['No (contractual)','Unclear','Yes'])}
      ${f('npi','Will it touch NPI / client PII?',['No','Yes — and approved/secured','Yes — not yet secured'])}
    </div>
    <div class="row">
      ${f('sec','Security (encryption, access, certs)?',['Documented','Partial','Unknown'])}
      ${f('breach','Breach notification terms?',['Yes','Unclear','None'])}
    </div>
    <div class="row">
      ${f('transparency','Model/version transparency & limits?',['Documented','Partial','None'])}
      ${f('bias','Fair-lending/bias evidence (if value/credit)?',['Provided','N/A','Required-missing'])}
    </div>
  </div>
  <div class="card"><div class="toolbar noprint" style="justify-content:flex-end">
      <button class="btn gold sm" onclick="saveVendor()">✓ Save to register</button></div>
    <div id="vetOut"></div></div>`;
};
function buildVet(){
  const v=vet;const gates=[];
  if(v.train==='Yes')gates.push("Vendor trains on our data — require no-training terms or reject.");
  if(v.npi==='Yes — not yet secured')gates.push("Touches NPI without being secured/approved — Safeguards/Pillar 3 blocker.");
  if(v.sec==='Unknown')gates.push("Security undocumented — obtain evidence before approval.");
  if(v.breach==='None')gates.push("No breach-notification terms — required for NPI-touching tools.");
  if(v.bias==='Required-missing')gates.push("Fair-lending/bias evidence required and missing.");
  const warns=[];
  if(v.train==='Unclear')warns.push("Training-on-data terms unclear — clarify in writing.");
  if(v.npi==='Yes — and approved/secured')warns.push("NPI-capable — keep inside the WISP and access-controlled.");
  if(v.transparency!=='Documented'&&v.transparency)warns.push("Model transparency limited — document known limits.");
  let verdict,cls;
  if(gates.length){verdict="REJECT / CONDITIONS REQUIRED";cls="red";}
  else if(warns.length){verdict="APPROVE WITH CONDITIONS";cls="yellow";}
  else if(v.name){verdict="APPROVE";cls="green";}
  else{verdict="Awaiting input";cls="gray";}
  const el=document.getElementById("vetOut");if(!el)return;
  el.innerHTML=`<h2>${esc(v.name||'Vendor')} — assessment</h2>
    <div class="inline"><span class="badge" style="background:var(--${cls==='gray'?'line':cls}bg,#eef1f6);color:var(--${cls==='gray'?'muted':cls})">${verdict}</span></div>
    ${gates.length?`<h3>Blocking gates</h3>${gates.map(g=>`<div class="ex red">${esc(g)}</div>`).join('')}`:''}
    ${warns.length?`<h3>Conditions</h3>${warns.map(g=>`<div class="ex yellow">${esc(g)}</div>`).join('')}`:''}
    ${!gates.length&&!warns.length&&v.name?`<div class="ex green">No blocking issues found. Add to approved-tool list with its max data class and a review date.</div>`:''}
    <div class="note">Require terms that prohibit training on your data, define security & breach notification, and let you meet your own regulatory obligations.</div>`;
}
function saveVendor(){if(!vet.name){toast("Add a vendor name first.");return;}state.vendors.push({...vet,id:uid(),date:today()});save();toast("Saved to vendor register.");}

    <td><button class="btn sm ghost" onclick="cliToOutreach('${c.id}')">✉</button> <button class="btn sm danger" onclick="delCli('${c.id}')">✕</button></td>
  </tr>`).join("")||`<tr><td colspan=6 class="empty">No clients</td></tr>`;
  const filt=['all',...SEGLIST].map(s=>`<button class="${cliFilter===s?'active':''}" onclick="cliFilter='${s}';render()">${s==='all'?'All':SEG[s].short}</button>`).join("");
  return `<div class="card noprint"><h2>Add prospect / client</h2>
    <div class="row">
      <div style="flex:2"><label>Firm</label><input id="cf"></div>
      <div><label>Contact</label><input id="cc"></div>
      <div><label>Segment</label><select id="cs">${SEGLIST.map(s=>`<option value="${s}">${SEG[s].name}</option>`).join('')}</select></div>
      <div style="flex:0"><label>&nbsp;</label><button class="btn" onclick="addCli()">Add</button></div>
    </div></div>
  <div class="card"><div class="inline" style="justify-content:space-between"><h2>Pipeline</h2><div class="seg-tabs" style="margin:0">${filt}</div></div>
    <table><tr><th>Firm</th><th>Seg</th><th>Stage</th><th>Next action</th><th>Last touch</th><th></th></tr>${rows}</table>
    <div class="legend">Stages: ${STAGES.join(" → ")}</div></div>`;
};
function stageSel(id,cur){return `<select style="font-size:12px;padding:5px 7px" onchange="updCli('${id}','stage',this.value)">${STAGES.map(s=>`<option ${s===cur?'selected':''}>${s}</option>`).join('')}</select>`;}
function addCli(){const f=document.getElementById('cf').value.trim();if(!f){toast("Enter a firm.");return;}
  state.clients.push({id:uid(),firm:f,contact:document.getElementById('cc').value,segment:document.getElementById('cs').value,stage:"Not contacted",nextAction:"Send warm email",lastTouch:""});save();render();}
function updCli(id,k,v){const c=state.clients.find(x=>x.id===id);if(c){c[k]=v;save();if(k==='stage')render();}}
function delCli(id){state.clients=state.clients.filter(x=>x.id!==id);save();render();}
function cliToOutreach(id){const c=state.clients.find(x=>x.id===id);if(c){outSeg=c.segment;outData={first:(c.contact||'').split(' ')[0],firm:c.firm,hook:''};go('outreach');}}

/* ---------- OUTREACH ---------- */
let outSeg="escrow";let outData={};
VIEWS.outreach=function(){
  const d=outData;
  const tabs=[...SEGLIST,'partner'].map(s=>`<button class="${outSeg===s?'active':''}" onclick="outSeg='${s}';render();buildOut()">${s==='partner'?'Referral partner':SEG[s].name}</button>`).join("");
  return `<div class="card noprint"><h2>Outreach studio</h2>
    <div class="seg-tabs">${tabs}</div>
    <div class="row">
      <div><label>First name</label><input value="${esc(d.first||'')}" oninput="outData.first=this.value;buildOut()"></div>
      <div><label>Firm</label><input value="${esc(d.firm||'')}" oninput="outData.firm=this.value;buildOut()"></div>
    </div>
    <div><label>Personal hook (the one thing not to fabricate)</label><textarea oninput="outData.hook=this.value;buildOut()" placeholder="A real detail: a listing, a relationship, something you know about their firm.">${esc(d.hook||'')}</textarea></div>
  </div>
  <div class="card"><div class="toolbar noprint" style="justify-content:flex-end">
      <button class="btn ghost sm" onclick="copyText(document.getElementById('outOut').textContent)">⧉ Copy draft</button></div>
    <div class="out" id="outOut"></div>
    <div class="note">Draft only — personalize the hook and send manually. Generic = ignored.</div></div>`;
};
function buildOut(){const el=document.getElementById("outOut");if(el)el.textContent=OUTREACH[outSeg](outData);}

/* ---------- KNOWLEDGE ---------- */
let kbSeg="escrow";
VIEWS.knowledge=function(){
  const tabs=SEGLIST.map(s=>`<button class="${kbSeg===s?'active':''}" onclick="kbSeg='${s}';render()">${SEG[s].name}</button>`).join("");
  const k=KB[kbSeg];
  const items=k.items.map(([t,d])=>`<div class="ex"><b>${esc(t)}</b><div class="move">${esc(d)}</div></div>`).join("");
  const faq=FAQ.map(([q,a])=>`<div style="margin-bottom:12px"><b>${esc(q)}</b><div style="color:var(--slate);font-size:13px;margin-top:3px">${esc(a)}</div></div>`).join("");
  return `<div class="card"><div class="seg-tabs">${tabs}</div><h2>${esc(k.title)}</h2>${items}
    <div class="note">Anchors current as of June 2026. Not legal advice — flag when a client needs their own counsel.</div></div>
  <div class="card"><h2>Objection handling / FAQ</h2>${faq}</div>`;
};

/* ---------- PROPOSALS ---------- */
const STAKE={
  broker:"A fair-housing complaint or a steering claim from AI-written marketing lands on the broker's license.",
  agent:"Published AI copy and images carry the agent's name and license; fair-housing and misrepresentation are personal.",
  escrow:"NPI in an ungoverned tool is an FTC-Safeguards breach with a 30-day reporting clock, and AI-amplified wire fraud is a direct-loss risk.",
  title:"NPI and vendor AI fall under ALTA Pillar 3, and an AI-assisted determination without human ownership is a professional-liability claim.",
  appraisal:"AI that compromises independence or supports a predetermined value is a USPAP and fair-lending exposure."
};
const SCOPE={
  broker:["A written firm AI-use policy with the mandatory fair-housing review step","An approved-tool list and a data rule (no client PII in consumer tools)","A short agent training session and a do/don't card","Vendor AI vetting as features appear","Ongoing oversight a few days a month"],
  agent:["A written AI-use policy and an agent do/don't card","A fair-housing self-check for AI-assisted listings","A verify-before-publish rule for AI facts and image disclosure","Consent and PII guardrails","Ongoing oversight through the firm"],
  escrow:["An AI addendum to your WISP (which tools may touch NPI; no-training terms)","An AI-aware, deepfake-resistant wire-verification checklist","Vendor AI due diligence for escrow-software features","An incident path tied to the 30-day Safeguards clock","Ongoing oversight a few days a month"],
  title:["An AI addendum mapped to ALTA Pillars 2 & 3 and the Safeguards Rule","A title-AI review standard (a qualified human owns every determination)","Vendor AI review under Pillar 3 third-party oversight","An AI-aware wire-verification checklist","Ongoing oversight a few days a month"],
  appraisal:["A written AI-use policy respecting USPAP and appraiser independence","A bias-testing approach for value/credit-relevant AI","An AVM quality-control program where AVMs are used","Tool/vendor vetting with no-training terms","Ongoing oversight"]
};
function snapExposures(rec){const qs=SNAP[rec.segment]||[];const reds=[],yellows=[];qs.forEach((o,i)=>{const v=rec.answers&&rec.answers[i];if(v==='red')reds.push(o);else if(v==='yellow')yellows.push(o);});return{reds,yellows};}
function proposalText(rec,opts){
  const id=state.identity;const ex=snapExposures(rec);
  let t=`PROPOSAL — AI GOVERNANCE ENGAGEMENT\n`;
  t+=`Prepared for: ${rec.firm||'[Firm]'}\nPrepared by: ${id.name}, ${id.practice}\nDate: ${today()}\nSegment: ${SEG[rec.segment].name}\n\n`;
  t+=`1. SITUATION\nBased on the AI Governance Snapshot${rec.date?` completed ${rec.date}`:''}, the following exposures were identified:\n`;
  if(ex.reds.length){t+=`\n  High — address first:\n`;ex.reds.forEach(o=>t+=`   • ${o.exp}\n`);}
  if(ex.yellows.length){t+=`\n  In use, needs governance:\n`;ex.yellows.forEach(o=>t+=`   • ${o.exp}\n`);}
  if(!ex.reds.length&&!ex.yellows.length)t+=`   • (Score this firm's Snapshot to populate specific exposures.)\n`;
  t+=`\n2. WHAT'S AT STAKE\n${STAKE[rec.segment]}\n\n`;
  t+=`3. SCOPE OF ENGAGEMENT\n`;(SCOPE[rec.segment]||[]).forEach(s=>t+=`   • ${s}\n`);
  t+=`\n4. HOW IT WORKS\nFractional Chief AI Officer — I own the governance outcome on an ongoing basis, not a one-time deck. Work is scoped to your firm on the Snapshot, not sold as a fixed package. Cadence: ${opts.days||'a few'} day(s) a month.\n`;
  t+=`\n5. INVESTMENT\n${opts.invest||'Scoped per engagement on the Snapshot. The Snapshot itself is free. Far less than the full-time CAIO this work would otherwise require, and a fraction of what a single bad outcome would cost.'}\n`;
  t+=`\n6. WHY LODESTAR\n${id.creds}\nIndependent of any vendor — no referral fees, no kickbacks.\n`;
  t+=`\n7. NEXT STEP\nReply to confirm scope, or book here: ${id.booking}\n${id.name} · ${id.email} · ${id.phone}\n`;
  t+=`\nNot legal advice. Lodestar builds governance that respects the rules and flags when you need your own counsel.`;
  return t;
}
let proSel="";let proOpts={};
VIEWS.proposals=function(){
  const snaps=state.snapshots;
  if(!proSel&&snaps.length)proSel=snaps[snaps.length-1].id;
  const options=snaps.map(s=>`<option value="${s.id}" ${proSel===s.id?'selected':''}>${esc(s.firm||'[Firm]')} — ${SEG[s.segment].short} — ${s.date}</option>`).join('');
  if(!snaps.length){return `<div class="card"><h2>Build a proposal from a Snapshot</h2>
    <div class="empty">No saved Snapshots yet. Run a Snapshot and save it, then the proposal builds from its exposures.</div>
    <div class="toolbar" style="justify-content:center"><button class="btn gold" onclick="go('snapshot')">◎ Run a Snapshot</button></div></div>`;}
  return `<div class="card noprint"><h2>Build a proposal from a Snapshot</h2>
    <div class="desc">Pick a saved Snapshot; the proposal pulls its exposures into a scoped engagement.</div>
    <div class="row">
      <div style="flex:2"><label>Saved Snapshot</label><select onchange="proSel=this.value;buildProposal()"><option value="">— select —</option>${options}</select></div>
      <div><label>Cadence (days/month)</label><input value="${esc(proOpts.days||'')}" placeholder="e.g., 2" oninput="proOpts.days=this.value;buildProposal()"></div>
    </div>
    <div><label>Investment framing (optional — blank keeps it unquoted)</label><textarea oninput="proOpts.invest=this.value;buildProposal()" placeholder="Leave blank to use the default 'scoped per engagement' language.">${esc(proOpts.invest||'')}</textarea></div>
  </div>
  <div class="card"><div class="toolbar noprint" style="justify-content:flex-end">
      <button class="btn ghost sm" onclick="window.print()">⎙ Print</button>
      <button class="btn ghost sm" onclick="copyText(document.getElementById('proOut').textContent)">⧉ Copy</button>
      <button class="btn ghost sm" onclick="proposalToEngagement()">◷ Add as engagement</button>
      <button class="btn gold sm" onclick="saveProposal()">✓ Save to record</button></div>
    <div class="out" id="proOut"></div></div>`;
};
function buildProposal(){const el=document.getElementById('proOut');if(!el)return;
  const rec=state.snapshots.find(s=>s.id===proSel);
  el.textContent=rec?proposalText(rec,proOpts):"Select a saved Snapshot above to generate the proposal.";}
function saveProposal(){const rec=state.snapshots.find(s=>s.id===proSel);if(!rec){toast("Select a Snapshot first.");return;}state.proposals.push({id:uid(),firm:rec.firm,segment:rec.segment,date:today()});save();toast("Proposal saved to record.");}
function proposalToEngagement(){const rec=state.snapshots.find(s=>s.id===proSel);if(!rec){toast("Select a Snapshot first.");return;}
  state.engagements.push({id:uid(),firm:rec.firm,contact:"",segment:rec.segment,type:"Project",status:"Prospect",start:today(),days:proOpts.days||"",term:"",renewal:"",fee:proOpts.invest||"Scoped per engagement",scope:(SCOPE[rec.segment]||[]).join(" · "),notes:"From proposal"});save();toast("Added to Engagements as a prospect.");go('engagements');}

/* ---------- ENGAGEMENTS / RETAINERS ---------- */
const ETYPE=["Snapshot","Discovery","Project","Retainer"];
const ESTAT=["Prospect","Active","Paused","Completed"];
function daysUntil(d){try{return Math.ceil((new Date(d+"T00:00:00")-new Date())/86400000);}catch(e){return 9999;}}
let engFilter="all";
VIEWS.engagements=function(){
  const list=state.engagements.filter(e=>engFilter==='all'||e.status===engFilter);
  const sel=(id,k,cur,arr)=>`<select style="font-size:12px;padding:5px 7px" onchange="updEng('${id}','${k}',this.value)">${arr.map(t=>`<option ${t===cur?'selected':''}>${t}</option>`).join('')}</select>`;
  const rows=list.map(e=>`<tr>
    <td>${esc(e.firm)}<div style="color:var(--muted);font-size:12px">${esc(e.contact||'')}</div></td>
    <td><span class="pill blue">${SEG[e.segment].short}</span></td>
    <td>${sel(e.id,'type',e.type,ETYPE)}</td>
    <td>${sel(e.id,'status',e.status,ESTAT)}</td>
    <td><input style="width:46px;font-size:12px;padding:5px 6px" value="${esc(e.days||'')}" onchange="updEng('${e.id}','days',this.value)"></td>
    <td><input style="font-size:12px;padding:5px 6px" type="date" value="${e.renewal||''}" onchange="updEng('${e.id}','renewal',this.value)"></td>
    <td style="max-width:260px;font-size:12px">${esc(e.scope||'')}</td>
    <td><button class="btn sm danger" onclick="delEng('${e.id}')">✕</button></td>
  </tr>`).join("")||`<tr><td colspan=8 class="empty">No engagements</td></tr>`;
  const filt=['all',...ESTAT].map(s=>`<button class="${engFilter===s?'active':''}" onclick="engFilter='${s}';render()">${s==='all'?'All':s}</button>`).join("");
  const soon=state.engagements.filter(e=>e.renewal&&e.status==='Active'&&daysUntil(e.renewal)<=30);
  const alert=soon.length?`<div class="note">⏰ ${soon.length} active retainer(s) renewing within 30 days: ${soon.map(e=>esc(e.firm)+' ('+e.renewal+')').join(' · ')}</div>`:'';
  return `<div class="card noprint"><h2>Add engagement</h2>
    <div class="row">
      <div style="flex:2"><label>Firm</label><input id="ef"></div>
      <div><label>Contact</label><input id="ec"></div>
      <div><label>Segment</label><select id="es">${SEGLIST.map(s=>`<option value="${s}">${SEG[s].short}</option>`).join('')}</select></div>
      <div><label>Type</label><select id="et">${ETYPE.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div style="flex:0"><label>&nbsp;</label><button class="btn" onclick="addEng()">Add</button></div>
    </div></div>
  <div class="card"><div class="inline" style="justify-content:space-between"><h2>Engagements &amp; retainers</h2><div class="seg-tabs" style="margin:0">${filt}</div></div>
    ${alert}
    <table><tr><th>Firm</th><th>Seg</th><th>Type</th><th>Status</th><th>Days/mo</th><th>Renewal</th><th>Scope</th><th></th></tr>${rows}</table>
    <div class="legend">Edit type, status, cadence, and renewal inline. Renewals within 30 days are flagged above.</div></div>`;
};
function addEng(){const f=document.getElementById('ef').value.trim();if(!f){toast("Enter a firm.");return;}
  state.engagements.push({id:uid(),firm:f,contact:document.getElementById('ec').value,segment:document.getElementById('es').value,type:document.getElementById('et').value,status:"Prospect",start:today(),days:"",term:"",renewal:"",fee:"Scoped per engagement",scope:"",notes:""});save();render();}
function updEng(id,k,v){const e=state.engagements.find(x=>x.id===id);if(e){e[k]=v;save();if(k==='status'||k==='renewal')render();}}
function delEng(id){state.engagements=state.engagements.filter(x=>x.id!==id);save();render();}

/* ---------- SETTINGS ---------- */
VIEWS.settings=function(){
  const i=state.identity;
  const f=(k,l)=>`<div><label>${l}</label><input value="${esc(i[k]||'')}" onchange="state.identity.${k}=this.value;save()"></div>`;
  return `<div class="card"><h2>Identity & signature</h2>
    <div class="desc">Used in outreach signatures and policy footers.</div>
    <div class="row">${f('name','Name')}${f('practice','Practice name')}</div>
    <div class="row">${f('email','Email')}${f('intake','Intake email')}</div>
    <div class="row">${f('phone','Phone')}${f('booking','Booking link')}</div>
    <div><label>Credentials line</label><input value="${esc(i.creds||'')}" onchange="state.identity.creds=this.value;save()"></div>
  </div>
  <div class="card"><h2>Data</h2>
    <div class="desc">All data lives only in this browser (localStorage). Back it up with Export.</div>
    <div class="toolbar">
      <button class="btn ghost" onclick="exportData()">⭳ Export JSON</button>
      <label class="btn ghost" style="cursor:pointer">⭱ Import JSON<input type="file" accept="application/json" style="display:none" onchange="importData(this)"></label>
      <button class="btn danger" onclick="resetAll()">Reset all data</button>
    </div>
  </div>
  <div class="card"><h2>About</h2>
    <div class="desc">Lodestar CAIO Practice Operating System — a self-contained tool covering the full service: Snapshot, Snapshot-to-proposal generator, policy generation, tool/vendor vetting, risk register, clients & pipeline, engagements & retainers, outreach, and the regulatory knowledge base, across brokers, agents, escrow, title, and appraisal. Offline, no accounts, no tracking.</div>
  </div>`;
};

/* ============================== UTIL ============================== */
function copyText(t){navigator.clipboard?.writeText(t).then(()=>toast("Copied."),()=>toast("Copy failed — select and copy."));}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="lodestar-caio-data.json";a.click();}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.identity){state=d;save();render();toast("Data imported.");}else toast("Not a valid file.");}catch(x){toast("Import failed.");}};r.readAsText(f);}
function resetAll(){if(confirm("Erase all data and restore defaults?")){state=structuredClone(DEFAULTS);save();render();}}
let toastT;function toast(m){let el=document.getElementById("toast");if(!el){el=document.createElement("div");el.id="toast";el.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#16223a;color:#fff;padding:11px 20px;border-radius:9px;font-size:14px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.25)";document.body.appendChild(el);}el.textContent=m;el.style.opacity="1";clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity="0",1900);}

render();
</script>
</body>
</html>
